site_name: cardano-tx-tools
site_url: !ENV [MKDOCS_SITE_URL, "https://lambdasistemi.github.io/cardano-tx-tools/"]
repo_url: https://github.com/lambdasistemi/cardano-tx-tools
repo_name: lambdasistemi/cardano-tx-tools

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - asciinema-player

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - def_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - assets/js/read-aloud.js

nav:
  - Home: index.md
  - tx-diff: tx-diff.md
  - tx-inspect: tx-inspect.md
  - rewriting-rules grammar: rewriting-rules.md
  - tx-sign: tx-sign.md
  - tx-validate: tx-validate.md
  - tx-graph: tx-graph.md
  - tx-fetch: tx-fetch.md
  - tx-view: tx-view.md
  - "May 2026 lattice demo":
      - may-2026-amaru-lattice/index.md
      - "Lattice boundary and shape":
          - may-2026-amaru-lattice/lattice-boundary-and-shape/index.md
