name: "Publish docker images"

env:
  REGISTRY: ghcr.io/lambdasistemi/cardano-tx-tools

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cardano-tx-generator:
    name: cardano-tx-generator
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG=$(nix eval --raw .#imageTag)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Build image (nix closure → OCI tarball)
        run: nix build --quiet .#cardano-tx-generator-image

      - name: Load image into docker
        run: docker load < result

      - name: Push image (commit-tagged)
        run: |
          docker push \
            ${{ env.REGISTRY }}/cardano-tx-generator:${{ steps.tag.outputs.tag }}

      - name: Push image (latest, on main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag \
            ${{ env.REGISTRY }}/cardano-tx-generator:${{ steps.tag.outputs.tag }} \
            ${{ env.REGISTRY }}/cardano-tx-generator:latest
          docker push ${{ env.REGISTRY }}/cardano-tx-generator:latest

      - name: Push image (release tag, on v* tag only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag \
            ${{ env.REGISTRY }}/cardano-tx-generator:${{ steps.tag.outputs.tag }} \
            ${{ env.REGISTRY }}/cardano-tx-generator:${{ github.ref_name }}
          docker push \
            ${{ env.REGISTRY }}/cardano-tx-generator:${{ github.ref_name }}
