name: Darwin Release

on:
  push:
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/darwin-release.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "scripts/release/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        type: choice
        options: [ "release", "dev-homebrew" ]
        default: "release"
      tag:
        description: "Existing tag to build for release mode, for example v0.1.0.0"
        required: false
        type: string
      publish:
        description: "Release mode only: upload to the GitHub release and update Homebrew"
        type: choice
        options: [ "no", "yes" ]
        default: "no"
      update_tap:
        description: "Dev Homebrew mode only: update lambdasistemi/homebrew-tap"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: >-
    darwin-release-${{
      github.ref_type == 'tag' && github.ref_name
      || inputs.tag
      || github.ref
    }}-${{ inputs.mode || github.event_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build aarch64-darwin tx-diff artifacts
    runs-on: macos-14
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      MODE: >-
        ${{
          github.event_name == 'pull_request' && 'dev-homebrew'
          || inputs.mode
          || 'release'
        }}
      PUBLISH: >-
        ${{
          github.event_name == 'push'
          || (inputs.mode != 'dev-homebrew' && inputs.publish == 'yes')
        }}
      UPDATE_TAP: ${{ inputs.update_tap || 'yes' }}
      DEV_TAG: dev-homebrew
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: >-
            ${{
              github.ref_type == 'tag' && github.ref_name
              || inputs.tag
              || github.ref
            }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build, smoke-test, and optionally publish Darwin Homebrew artifacts
        uses: paolino/dev-assets/darwin-homebrew-release@6864b20eb75c3578796e7f667562b5aea8780643
        with:
          mode: ${{ env.MODE }}
          tag: ${{ env.TAG }}
          publish: ${{ env.PUBLISH }}
          update-tap: ${{ env.UPDATE_TAP }}
          dev-tag: ${{ env.DEV_TAG }}
          release-package: darwin-release-artifacts
          dev-package: darwin-dev-homebrew-artifacts
          release-formula: tx-diff.rb
          dev-formula: tx-diff-dev.rb
          release-artifact-name: darwin-release-bundle
          dev-artifact-name: darwin-dev-homebrew-artifacts
          tarball-pattern: tx-diff-*-aarch64-darwin.tar.gz
          installed-commands: tx-diff
          cleanup-formulae: tx-diff tx-diff-dev
          tap-name: lambdasistemi/tap
          tap-repository: lambdasistemi/homebrew-tap
          github-token: ${{ github.token }}
          tap-token: ${{ secrets.TAP_TOKEN }}
          release-check-command: 'scripts/release/check-version-consistency "$TAG"'
          release-notes-command: 'scripts/release/extract-notes "$TAG"'
          release-title: tx-diff ${{ env.TAG }}
          dev-release-title: tx-diff dev Homebrew
          tarball-smoke-script: |
            if tx-diff >/tmp/tx-diff.out 2>&1; then
              cat /tmp/tx-diff.out
              exit 1
            fi
            cat /tmp/tx-diff.out
            grep -F "Usage:" /tmp/tx-diff.out >/dev/null
            grep -F "[--blueprint FILE ...]" /tmp/tx-diff.out >/dev/null
          brew-smoke-script: |
            if tx-diff >/tmp/tx-diff.out 2>&1; then
              cat /tmp/tx-diff.out
              exit 1
            fi
            cat /tmp/tx-diff.out
            grep -F "Usage:" /tmp/tx-diff.out >/dev/null
            otool -L "$(which tx-diff)"
