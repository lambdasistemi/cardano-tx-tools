name: Linux Release

on:
  push:
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/release.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "scripts/release/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        default: release
        type: choice
        options:
          - release
          - dev-linux
      tag:
        description: "Existing release tag, for example v0.1.0.0"
        required: false
        type: string
      publish:
        description: "Upload release assets when mode=release"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: linux-release-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name || inputs.tag || inputs.mode }}
  cancel-in-progress: false

jobs:
  linux-bundles:
    name: Build Linux ${{ matrix.executable.name }} (${{ matrix.arch.id }})
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - id: x86_64
            runner: nixos
          - id: aarch64
            runner: ubuntu-24.04-arm
        executable:
          - name: tx-diff
            release-output: tx-diff-linux-release-artifacts
            dev-output: tx-diff-linux-dev-release-artifacts
            usage-grep: "[--blueprint FILE ...]"
            dev-tag: dev-linux-tx-diff
          - name: tx-validate
            release-output: tx-validate-linux-release-artifacts
            dev-output: tx-validate-linux-dev-release-artifacts
            usage-grep: "--n2c-socket-path PATH"
            dev-tag: dev-linux-tx-validate
          - name: tx-inspect
            release-output: tx-inspect-linux-release-artifacts
            dev-output: tx-inspect-linux-dev-release-artifacts
            usage-grep: "[--rules FILE]"
            dev-tag: dev-linux-tx-inspect
          - name: tx-sign
            release-output: tx-sign-linux-release-artifacts
            dev-output: tx-sign-linux-dev-release-artifacts
            usage-grep: "Create or use an encrypted Cardano"
            dev-tag: dev-linux-tx-sign
          - name: tx-graph
            release-output: tx-graph-linux-release-artifacts
            dev-output: tx-graph-linux-dev-release-artifacts
            usage-grep: "operator-entity overlay + body emitter"
            dev-tag: dev-linux-tx-graph
          - name: tx-fetch
            release-output: tx-fetch-linux-release-artifacts
            dev-output: tx-fetch-linux-dev-release-artifacts
            usage-grep: "closure-walking Conway CBOR fetcher"
            dev-tag: dev-linux-tx-fetch
          - name: cardano-tx-generator
            release-output: cardano-tx-generator-linux-release-artifacts
            dev-output: cardano-tx-generator-linux-dev-release-artifacts
            usage-grep: "--relay-socket PATH"
            dev-tag: dev-linux-cardano-tx-generator
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || github.ref }}

      # The self-hosted `nixos` runner has nix preinstalled (cachix-action
      # wires read+push); the GitHub-hosted arm runner needs nix installed via
      # the hardened setup-nix.
      - if: matrix.arch.runner == 'nixos'
        uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - if: matrix.arch.runner != 'nixos'
        uses: paolino/dev-assets/setup-nix@v0.1.0
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: paolino/dev-assets/linux-release@v0.1.0
        with:
          mode: >-
            ${{
              github.event_name == 'pull_request' && 'dev-linux'
              || inputs.mode
              || 'release'
            }}
          tag: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          publish: >-
            ${{
              github.event_name == 'push' && 'yes'
              || inputs.publish
              || 'no'
            }}
          release-output: ${{ matrix.executable.release-output }}
          dev-output: ${{ matrix.executable.dev-output }}
          executable-name: ${{ matrix.executable.name }}
          usage-grep: ${{ matrix.executable.usage-grep }}
          dev-tag: ${{ matrix.executable.dev-tag }}
          release-version-command: scripts/release/get-cabal-version
          release-check-command: 'scripts/release/check-version-consistency "$TAG"'
          release-notes-command: 'scripts/release/extract-notes "$TAG"'
          release-title: cardano-tx-tools ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          dev-release-title: ${{ matrix.executable.name }} dev Linux bundles
          github-token: ${{ github.token }}
